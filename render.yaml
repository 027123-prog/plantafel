        value: tocayvbnygkkhwvhhgow
      - key: SUPABASE_PUBLISHABLE_KEY
        value: sb_publishable_3bGCEvb_q5ketEmdW7spZA_OQexSorJ
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
